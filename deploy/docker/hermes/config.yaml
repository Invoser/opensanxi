model:
  default: "gpt-5.5"
  provider: "custom"
  base_url: "https://sub.sanxi.cfd/v1"
  api_mode: "codex_responses"

custom_providers:
  - name: "baixian"
    base_url: "https://sub.sanxi.cfd/v1"
    key_env: "BAIXIAN_API_KEY"
    api_mode: "codex_responses"

timezone: "Asia/Shanghai"

terminal:
  backend: "local"
  cwd: "/opt/data"

web:
  search_backend: "searxng"

mcp_servers:
  opensanxi:
    url: "http://personal-mcp:8787/mcp"
    enabled: true
    tools:
      include:
        - add_memo
        - search_memos
        - add_transaction
        - query_transactions
        - monthly_finance_summary
