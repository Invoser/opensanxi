name: opensanxi

x-restart-policy: &restart-policy
  restart: unless-stopped

x-common-env: &common-env
  TZ: ${TZ:-Asia/Shanghai}

services:
  caddy:
    image: caddy:2.10-alpine
    <<: *restart-policy
    depends_on:
      personal-web:
        condition: service_started
      personal-api:
        condition: service_started
    environment:
      <<: *common-env
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-http://localhost}
      CADDY_ADMIN: ${CADDY_ADMIN:-off}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin@example.com}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:?Set BASIC_AUTH_HASH in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - personal-assistant

  personal-api:
    image: ${PERSONAL_API_IMAGE:-opensanxi-api:local}
    <<: *restart-policy
    env_file:
      - ./env/personal-api.env.example
    environment:
      <<: *common-env
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PERSONAL_API_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-assistant}:${POSTGRES_PASSWORD:-assistant_dev_password}@postgres:5432/${POSTGRES_DB:-assistant}}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-assistant}:${MONGO_INITDB_ROOT_PASSWORD:-assistant_dev_password}@mongo:27017/${MONGO_DATABASE:-assistant}?authSource=admin}
      PERSONAL_WEB_URL: ${PERSONAL_WEB_URL:-http://personal-web:80}
      PERSONAL_MCP_URL: ${PERSONAL_MCP_URL:-http://personal-mcp:8787}
      HERMES_API_URL: ${HERMES_API_URL:-http://llm-bridge:8765}
      LIBRECHAT_URL: ${LIBRECHAT_URL:-http://librechat:3080}
    expose:
      - "${PERSONAL_API_PORT:-8080}"
    depends_on:
      personal-api-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - personal-assistant

  personal-api-migrate:
    image: ${PERSONAL_API_IMAGE:-opensanxi-api:local}
    env_file:
      - ./env/personal-api.env.example
    environment:
      <<: *common-env
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-assistant}:${POSTGRES_PASSWORD:-assistant_dev_password}@postgres:5432/${POSTGRES_DB:-assistant}}
    command: ["npm", "run", "prisma:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - personal-assistant

  personal-web:
    image: ${PERSONAL_WEB_IMAGE:-opensanxi-web:local}
    <<: *restart-policy
    env_file:
      - ./env/personal-web.env.example
    environment:
      <<: *common-env
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PERSONAL_WEB_PORT:-80}
      API_URL: ${API_URL:-http://personal-api:8080}
      MCP_URL: ${MCP_URL:-http://personal-mcp:8787}
      LIBRECHAT_URL: ${LIBRECHAT_URL:-http://librechat:3080}
      HERMES_API_URL: ${HERMES_API_URL:-http://llm-bridge:8765}
    expose:
      - "${PERSONAL_WEB_PORT:-80}"
    depends_on:
      personal-api:
        condition: service_started
    networks:
      - personal-assistant

  personal-mcp:
    profiles: ["ai", "hermes"]
    image: ${PERSONAL_MCP_IMAGE:-opensanxi-mcp:local}
    <<: *restart-policy
    env_file:
      - ./env/personal-mcp.env.example
    environment:
      <<: *common-env
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PERSONAL_MCP_PORT:-8787}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-assistant}:${POSTGRES_PASSWORD:-assistant_dev_password}@postgres:5432/${POSTGRES_DB:-assistant}}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-assistant}:${MONGO_INITDB_ROOT_PASSWORD:-assistant_dev_password}@mongo:27017/${MONGO_DATABASE:-assistant}?authSource=admin}
      PERSONAL_API_URL: ${PERSONAL_API_URL:-http://personal-api:8080}
      PERSONAL_API_BASE_URL: ${PERSONAL_API_BASE_URL:-http://personal-api:8080}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_PATH: ${MCP_PATH:-/mcp}
      HERMES_API_URL: ${HERMES_API_URL:-http://llm-bridge:8765}
      LIBRECHAT_URL: ${LIBRECHAT_URL:-http://librechat:3080}
    expose:
      - "${PERSONAL_MCP_PORT:-8787}"
    depends_on:
      personal-api:
        condition: service_started
    networks:
      - personal-assistant

  llm-bridge:
    profiles: ["ai", "chat"]
    image: ${LLM_BRIDGE_IMAGE:-opensanxi-llm-bridge:local}
    <<: *restart-policy
    env_file:
      - ./env/llm-bridge.env.example
    environment:
      <<: *common-env
      HOST: 0.0.0.0
      PORT: ${LLM_BRIDGE_PORT:-8765}
      API_SERVER_KEY: ${API_SERVER_KEY:-change-me}
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://api.openai.com/v1}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-replace-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEFAULT_MODEL: ${LLM_BRIDGE_DEFAULT_MODEL:-gpt-5.5}
      MODEL_REASONING_EFFORT: ${LLM_BRIDGE_REASONING_EFFORT:-high}
    expose:
      - "${LLM_BRIDGE_PORT:-8765}"
    networks:
      - personal-assistant

  hermes:
    profiles: ["hermes"]
    image: ${HERMES_IMAGE:-hermes-agent:local}
    <<: *restart-policy
    env_file:
      - ./hermes/hermes.env.example
    environment:
      <<: *common-env
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      API_SERVER_PORT: ${API_SERVER_PORT:-8765}
      API_SERVER_KEY: ${API_SERVER_KEY:-change-me}
      POSTGRES_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-assistant}:${POSTGRES_PASSWORD:-assistant_dev_password}@postgres:5432/${POSTGRES_DB:-assistant}}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-assistant}:${MONGO_INITDB_ROOT_PASSWORD:-assistant_dev_password}@mongo:27017/${MONGO_DATABASE:-assistant}?authSource=admin}
      PERSONAL_API_URL: ${PERSONAL_API_URL:-http://personal-api:8080}
      PERSONAL_MCP_URL: ${PERSONAL_MCP_URL:-http://personal-mcp:8787}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "${API_SERVER_PORT:-8765}"
      - "9119"
    volumes:
      - hermes_data:/opt/data
      - ./hermes/config.yaml:/opt/data/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -eu
        if [ -x /init ] && [ -x /opt/hermes/docker/main-wrapper.sh ]; then
          exec /init /opt/hermes/docker/main-wrapper.sh gateway run
        fi
        if [ -f /opt/hermes/docker/entrypoint.sh ]; then
          tr -d '\r' < /opt/hermes/docker/entrypoint.sh > /tmp/hermes-entrypoint.sh
          chmod +x /tmp/hermes-entrypoint.sh
          exec /tmp/hermes-entrypoint.sh gateway run
        fi
        exec hermes gateway run
    networks:
      - personal-assistant

  hermes-ui:
    profiles: ["hermes"]
    image: ${HERMES_IMAGE:-hermes-agent:local}
    <<: *restart-policy
    env_file:
      - ./hermes/hermes.env.example
    environment:
      <<: *common-env
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      HERMES_UI_PORT: ${HERMES_UI_PORT:-3333}
      HERMES_UI_BASE_PATH: ${HERMES_UI_BASE_PATH:-/agent}
      HERMES_UI_PASSWORD: ${HERMES_UI_PASSWORD:-}
      POSTGRES_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-assistant}:${POSTGRES_PASSWORD:-assistant_dev_password}@postgres:5432/${POSTGRES_DB:-assistant}}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-assistant}:${MONGO_INITDB_ROOT_PASSWORD:-assistant_dev_password}@mongo:27017/${MONGO_DATABASE:-assistant}?authSource=admin}
      PERSONAL_API_URL: ${PERSONAL_API_URL:-http://personal-api:8080}
      PERSONAL_MCP_URL: ${PERSONAL_MCP_URL:-http://personal-mcp:8787}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BAIXIAN_API_KEY: ${BAIXIAN_API_KEY:-}
      CFD_API_KEY: ${CFD_API_KEY:-}
      SANXI_API_KEY: ${SANXI_API_KEY:-}
      CUSTOM_BASE_URL: ${BAIXIAN_BASE_URL:-https://sub.sanxi.cfd/v1}
      CUSTOM_API_KEY: ${BAIXIAN_API_KEY:-}
      HERMES_UI_MODELS: ${HERMES_UI_MODELS:-gpt-5.5}
    expose:
      - "${HERMES_UI_PORT:-3333}"
    volumes:
      - hermes_data:/opt/data
      - ${HERMES_UI_CONTEXT:-../hermes-ui}:/opt/hermes-ui:ro
      - ./hermes/config.yaml:/opt/data/.hermes/config.yaml:ro
      - ./hermes/config.yaml:/opt/data/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      personal-api:
        condition: service_started
      personal-mcp:
        condition: service_started
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -eu
        export HOME=/opt/data
        export HERMES_HOME=/opt/data
        agent_dir="/opt/data/.hermes/hermes-agent"
        ui_dir="/tmp/hermes-ui"
        mkdir -p "$$agent_dir" /opt/data/.hermes
        find "$$agent_dir" -mindepth 1 -maxdepth 1 -type l -delete
        for item in /opt/hermes/* /opt/hermes/.[!.]*; do
          [ -e "$$item" ] || continue
          ln -sfn "$$item" "$$agent_dir/$$(basename "$$item")"
        done
        ln -sfn /opt/hermes/.venv "$$agent_dir/venv"
        rm -rf "$$ui_dir"
        cp -a /opt/hermes-ui "$$ui_dir"
        python - <<'PY'
        import os
        import pathlib
        import re

        base = os.environ.get("HERMES_UI_BASE_PATH", "/agent").rstrip("/") or "/agent"
        html = pathlib.Path("/tmp/hermes-ui/hermes-ui.html")
        text = html.read_text(encoding="utf-8")
        text = text.replace("const API_BASE = '';", f"const API_BASE = window.HERMES_UI_BASE_PATH || '{base}';")
        text = re.sub(r"fetch\('/(api|health|memory|skills|browse|readfile|writefile|cron|terminal|server)", r"fetch(API_BASE + '/\1", text)
        text = text.replace('src="/filler-bg.png"', 'src={API_BASE + "/filler-bg.png"}')
        html.write_text(text, encoding="utf-8")
        PY
        exec /opt/hermes/.venv/bin/python "$$ui_dir/serve_lite.py" --port "$${HERMES_UI_PORT:-3333}"
    networks:
      - personal-assistant

  librechat:
    profiles: ["chat"]
    image: ${LIBRECHAT_IMAGE:-registry.librechat.ai/danny-avila/librechat-dev:latest}
    <<: *restart-policy
    env_file:
      - ./env/librechat.env.example
    environment:
      <<: *common-env
      HOST: 0.0.0.0
      PORT: ${LIBRECHAT_PORT:-3080}
      MONGO_URI: ${LIBRECHAT_MONGO_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-assistant}:${MONGO_INITDB_ROOT_PASSWORD:-assistant_dev_password}@mongo:27017/${LIBRECHAT_MONGO_DATABASE:-LibreChat}?authSource=admin}
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-meili-master-key}
      RAG_API_URL: http://librechat-rag:8000
      RAG_PORT: 8000
      CONFIG_PATH: /app/librechat.yaml
      ENDPOINTS: custom
      API_SERVER_KEY: ${API_SERVER_KEY:-change-me}
      LLM_BRIDGE_URL: ${LLM_BRIDGE_URL:-http://llm-bridge:8765/v1}
      DOMAIN_CLIENT: ${LIBRECHAT_DOMAIN_CLIENT:-http://localhost:8088/chat/}
      DOMAIN_SERVER: ${LIBRECHAT_DOMAIN_SERVER:-http://localhost:8088/chat/}
      ALLOW_EMAIL_LOGIN: ${LIBRECHAT_ALLOW_EMAIL_LOGIN:-true}
      ALLOW_REGISTRATION: ${LIBRECHAT_ALLOW_REGISTRATION:-true}
      ALLOW_UNVERIFIED_EMAIL_LOGIN: ${LIBRECHAT_ALLOW_UNVERIFIED_EMAIL_LOGIN:-true}
      ALLOW_SOCIAL_LOGIN: "false"
      ALLOW_SOCIAL_REGISTRATION: "false"
    expose:
      - "${LIBRECHAT_PORT:-3080}"
    volumes:
      - ./librechat/librechat.yaml:/app/librechat.yaml:ro
      - librechat_images:/app/client/public/images
      - librechat_uploads:/app/uploads
      - librechat_logs:/app/logs
    depends_on:
      llm-bridge:
        condition: service_started
      mongo:
        condition: service_healthy
      meilisearch:
        condition: service_started
      librechat-rag:
        condition: service_started
    networks:
      - personal-assistant

  librechat-rag:
    profiles: ["chat"]
    image: ${LIBRECHAT_RAG_IMAGE:-registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest}
    <<: *restart-policy
    env_file:
      - ./env/librechat.env.example
    environment:
      <<: *common-env
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assistant_dev_password}
      RAG_PORT: 8000
      API_SERVER_KEY: ${API_SERVER_KEY:-change-me}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - personal-assistant

  meilisearch:
    profiles: ["chat"]
    image: getmeili/meilisearch:v1.35.1
    <<: *restart-policy
    environment:
      <<: *common-env
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-meili-master-key}
    volumes:
      - meili_data:/meili_data
    expose:
      - "7700"
    networks:
      - personal-assistant

  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    <<: *restart-policy
    environment:
      <<: *common-env
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assistant_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - personal-assistant

  mongo:
    profiles: ["chat", "ai", "hermes"]
    image: mongo:8.0
    <<: *restart-policy
    environment:
      <<: *common-env
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-assistant}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-assistant_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-assistant}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - personal-assistant

networks:
  personal-assistant:
    name: opensanxi

volumes:
  caddy_data:
  caddy_config:
  hermes_data:
  librechat_images:
  librechat_uploads:
  librechat_logs:
  meili_data:
  postgres_data:
  mongo_data:
