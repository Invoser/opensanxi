version: 1.3.11
cache: true

interface:
  customWelcome: "Personal Assistant"
  modelSelect: true
  parameters: true
  endpointsMenu: true
  fileSearch: true

registration:
  socialLogins: []
  allowedDomains: []

endpoints:
  custom:
    - name: "OpenSanxi"
      apiKey: "${API_SERVER_KEY}"
      baseURL: "${LLM_BRIDGE_URL}"
      models:
        default:
          - "gpt-5.5"
      titleConvo: true
      titleModel: "gpt-5.5"
      modelDisplayLabel: "OpenSanxi"

mcpServers:
  personal:
    type: streamable-http
    url: "http://personal-mcp:8787/mcp"
    timeout: 120000

mcpSettings:
  allowedDomains:
    - "personal-mcp"
    - "localhost"
  allowedAddresses:
    - "personal-mcp:8787"
    - "127.0.0.1:8787"
